<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up | Homework Tracker Pro</title>
  <link rel="stylesheet" href="signup.css"/>
</head>
<body>

<div class="auth-container">

  <!-- LEFT PANEL -->
  <div class="auth-left">
    <div class="brand">
      <h1>HomeworkTracker <span>Pro</span></h1>
      <p>Organize, track, and complete homework efficiently.</p>
    </div>
    <div class="glow-orb"></div>
  </div>

  <!-- RIGHT PANEL -->
  <div class="auth-right">
    <div class="auth-card">

      <h2>Create account</h2>
      <p class="muted">Start your productivity journey</p>

      <form>
        <label>Full Name</label>
        <input type="text" placeholder="John Doe" required />

        <label>Email</label>
        <input type="email" placeholder="you@example.com" required />

        <label>Password</label>
        <input type="password" placeholder="••••••••" required />

        <label>Confirm Password</label>
        <input type="password" placeholder="••••••••" required />

        <label>Role</label>
        <select>
          <option>Student</option>
          <option>Teacher</option>
          <option>Parent</option>
        </select>

        <label class="checkbox">
          <input type="checkbox" required/>
          I agree to terms and conditions
        </label>

        <button class="btn-primary">Create Account</button>

        <div class="divider">OR</div>

        <button class="btn-secondary">Continue with Google</button>

        <p class="switch">
          Already have an account?
          <a href="login.html">Log in</a>
        </p>
      </form>

    </div>
  </div>

</div>

</body>
</html>

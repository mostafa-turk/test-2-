<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login | Homework Tracker Pro</title>
  <link rel="stylesheet" href="login.css"/>
</head>
<body>

<div class="auth-container">

  <!-- LEFT PANEL -->
  <div class="auth-left">
    <div class="brand">
      <h1>HomeworkTracker <span>Pro</span></h1>
      <p>Track homework smarter, not harder.</p>
    </div>
    <div class="glow-orb"></div>
  </div>

  <!-- RIGHT PANEL -->
  <div class="auth-right">
    <div class="auth-card">

      <h2>Welcome back</h2>
      <p class="muted">Login to continue your workspace</p>

      <form>
        <label>Email</label>
        <input type="email" placeholder="you@example.com" required />

        <label>Password</label>
        <div class="password-box">
          <input type="password" placeholder="••••••••" required />
        </div>

        <div class="row">
          <label class="checkbox">
            <input type="checkbox"/> Remember me
          </label>
          <a href="#" class="link">Forgot password?</a>
        </div>

        <button class="btn-primary">Login</button>

        <div class="divider">OR</div>

        <button class="btn-secondary">Continue with Google</button>

        <p class="switch">
          Don’t have an account?
          <a href="signup.html">Sign up</a>
        </p>
      </form>

    </div>
  </div>

</div>

</body>
</html>
